<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-primary">
            <h4 class="card-title">System Permissions</h4>
            <p class="card-category">View and manage system permissions</p>
          </div>
          <div class="card-body">
            <div class="alert alert-info">
              <strong>Note:</strong> These are the available permissions in the system. Assign permissions to users through the User Management page or Employee edit form.
            </div>
            
            <div *ngFor="let module of modules" class="mb-4">
              <h5 class="text-primary">{{ module }} Module</h5>
              <div class="table-responsive">
                <table class="table table-sm">
                  <thead>
                    <tr>
                      <th>Permission</th>
                      <th>Description</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let permission of groupedPermissions[module]">
                      <td><code>{{ permission.name }}</code></td>
                      <td>{{ permission.description }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
