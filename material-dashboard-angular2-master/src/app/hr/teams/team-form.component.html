<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-primary">
            <h4 class="card-title">{{ isEditMode ? 'Edit Team' : 'Add Team' }}</h4>
            <p class="card-category">{{ isEditMode ? 'Update team information' : 'Create new team' }}</p>
          </div>
          <div class="card-body">
            <form [formGroup]="teamForm" (ngSubmit)="onSubmit()">
              <div class="row">
                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <input matInput placeholder="Team Name *" formControlName="name">
                    <mat-error *ngIf="teamForm.get('name').hasError('required')">
                      Team name is required
                    </mat-error>
                  </mat-form-field>
                </div>
                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-select placeholder="Team Type" formControlName="teamTypeId">
                      <mat-option [value]="null">None</mat-option>
                      <mat-option *ngFor="let type of teamTypes" [value]="type.id">
                        {{ type.name }}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-select placeholder="Team Leader" formControlName="teamLeaderId">
                      <mat-option [value]="null">None</mat-option>
                      <mat-option *ngFor="let emp of employees" [value]="emp.id">
                        {{ emp.fullName }} ({{ emp.employeeNumber }})
                      </mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>
                <div class="col-md-6" *ngIf="isEditMode">
                  <mat-slide-toggle formControlName="isActive" class="mt-3">
                    Active Team
                  </mat-slide-toggle>
                </div>
              </div>

              <div class="row">
                <div class="col-md-12">
                  <mat-form-field class="w-100">
                    <textarea matInput placeholder="Description" 
                              formControlName="description" 
                              rows="3"></textarea>
                  </mat-form-field>
                </div>
              </div>

              <!-- Action Buttons -->
              <div class="row">
                <div class="col-md-12">
                  <button mat-raised-button color="primary" type="submit" [disabled]="!teamForm.valid || loading">
                    <mat-icon>save</mat-icon> {{ isEditMode ? 'Update' : 'Create' }} Team
                  </button>
                  <button mat-raised-button type="button" (click)="onCancel()" class="ml-2">
                    <mat-icon>cancel</mat-icon> Cancel
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
